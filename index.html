<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <title>Enterprise Omni-Agent AI Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    @keyframes checkmark-path-draw {
      0% {
        stroke-dashoffset: 25;
      }

      100% {
        stroke-dashoffset: 0;
      }
    }

    .checkmark-path-animated {
      stroke-dasharray: 25;
      stroke-dashoffset: 25;
      animation: checkmark-path-draw 0.4s ease-in-out forwards;
    }

    @keyframes checkmark-circle-pop {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.2);
      }

      100% {
        transform: scale(1);
      }
    }

    .checkmark-circle-pop-animated {
      animation: checkmark-circle-pop 0.3s ease-in-out;
    }
  </style>

</head>

<body class="bg-gray-100 dark:bg-gray-900">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
