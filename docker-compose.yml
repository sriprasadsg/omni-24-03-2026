version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: omni-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: omni_platform
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - omni-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: omni-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017/
      - DATABASE_NAME=omni_platform
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-this-secret-key}
      - JWT_REFRESH_SECRET_KEY=${JWT_REFRESH_SECRET_KEY:-change-this-refresh-key}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PYTHONUNBUFFERED=1
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - omni-network
    volumes:
      - ./backend:/app
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: omni-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE=http://localhost:5000/api
      - VITE_PROXY_TARGET=http://backend:5000
    depends_on:
      - backend
    networks:
      - omni-network
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./index.html:/app/index.html
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Agent (Optional)
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: omni-agent
    restart: unless-stopped
    environment:
      - AGENT_TOKEN=${AGENT_TOKEN}
      - BACKEND_URL=http://backend:5000
      - TENANT_ID=${TENANT_ID}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - omni-network
    volumes:
      - ./agent:/app
      - agent_logs:/app/logs
    profiles:
      - agent  # Only start if explicitly enabled

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    container_name: omni-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - omni-network
    profiles:
      - production  # Only start in production

networks:
  omni-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  backend_logs:
    driver: local
  agent_logs:
    driver: local
  nginx_logs:
    driver: local
